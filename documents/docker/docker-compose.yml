version: "3.9"

# Evolution API V3 (WhatsApp self-hosted) + Postgres + Redis
# Sobe com: ./scripts/start-evolution.sh
# Imagem oficial: https://github.com/EvolutionAPI/evolution-api

services:
  postgres:
    image: postgres:16-alpine
    container_name: evolution-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution_pass_change_me
      POSTGRES_DB: evolution
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - evolution-net

  redis:
    image: redis:7-alpine
    container_name: evolution-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - evolution-net

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      # ===== Server =====
      SERVER_TYPE: http
      SERVER_PORT: 8080
      SERVER_URL: http://localhost:8080

      # ===== Auth =====
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-change-me-strong-key}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"

      # ===== Database (Postgres) =====
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution_pass_change_me@postgres:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution_exchange
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"

      # ===== Cache (Redis) =====
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/0
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "true"
      CACHE_LOCAL_ENABLED: "false"

      # ===== WhatsApp (Baileys) =====
      CONFIG_SESSION_PHONE_CLIENT: Gestor de Trafego
      CONFIG_SESSION_PHONE_NAME: Chrome
      QRCODE_LIMIT: 30

      # ===== Logs =====
      LOG_LEVEL: ERROR,WARN,INFO
      LOG_COLOR: "true"
      LOG_BAILEYS: error

      # ===== Webhook global (opcional, descomenta se quiser receber mensagens recebidas) =====
      # WEBHOOK_GLOBAL_URL: http://host.docker.internal:3000/webhook
      # WEBHOOK_GLOBAL_ENABLED: "true"

      # ===== Telemetria =====
      TELEMETRY: "false"
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - evolution-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  evolution_instances:

networks:
  evolution-net:
    driver: bridge
